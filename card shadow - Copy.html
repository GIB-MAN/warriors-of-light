<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<style>

body{
  background:#0f0f0f;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.card-wrapper{
  position:relative;
  width:170px;
}

/* უკან არსებული layer-ები */
.card-wrapper::before,
.card-wrapper::after{
  content:"";
  position:absolute;
  left:0;
  width:100%;

  border-radius:7.25px 7.25px 0 0;
  background:#F4B8BD;
  z-index:0;
  transition:all .3s ease;
  
}

/* პირველი 154პხ */
 .card-wrapper::before{
   height:8px;
  top:-8px;
  opacity:.6;
   left:8px;
  width:calc(100% - 16px);
    border-top:1px solid #0f0f0f;
}

/* მეორე 133პხ რ7,25*/
  .card-wrapper::after{
    height:6px;
  top:-14px;
  opacity:.35;
  left:18px;
  width:calc(100% - 37px);
  border-bottom:1px solid #0f0f0f;
}

/* მთავარი card */
.card{
  position:relative;
  border-top:1px solid #0f0f0f;
  border-radius:7.25px;
  overflow:hidden;
  z-index:2;
  transform:translateY(0);
  transition:all .3s ease;
}

.card img{
  width:100%;
  display:block;
}

/* hover animation */
.card-wrapper:hover .card{
  //transform:translateY(-6px);
}

.card-wrapper:hover::before{
  //top:-10px;
  opacity:.4;
}

.card-wrapper:hover::after{
  //top:-20px;
  opacity:.2;
}

</style>
</head>
<body>

<div class="card-wrapper">
  <div class="card">
    <img src="daily-mix-2.png" alt="cover">
  </div>
</div>
</body>
<html>
