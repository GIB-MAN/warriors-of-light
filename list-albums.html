<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main class="list-albums-page">
        <!-- HERO -->
        <section class="list-albums-hero">
            <img class="list-albums-hero-image" src="./assets/images/desktop/cards/icons-and-frames-Nazi/daft-punk2.png"
                alt="Daft Punk cover">
            <div class="list-albums-hero-overlay"></div>

            <div class="list-albums-hero-content">
                <div class="list-albums-hero-info">
                    <h1 class="list-albums-title">Daft Punk</h1>
                    <p class="list-albums-monthly-listeners">20,795,080 monthly listeners</p>
                </div>

                <div class="list-albums-hero-actions">
                    <button class="list-albums-play-button" type="button" aria-label="Play">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/play-active.png" alt="Play">
                    </button>

                    <button class="list-albums-follow-button" type="button" aria-label="Follow">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/follow.png" alt="Follow">
                    </button>

                    <button class="list-albums-icon-button" type="button" aria-label="Add">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/plus-active.png" alt="Add">
                    </button>

                    <button class="list-albums-icon-button" type="button" aria-label="More">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/create-active.png" alt="More">
                    </button>

                    <button class="list-albums-icon-button" type="button" aria-label="Options">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/dots-active.png" alt="Options">
                    </button>
                </div>
            </div>
        </section>

        <!-- MENU -->
        <section class="list-albums-menu" aria-label="Artist navigation">
            <div class="list-albums-menu-list">
                <div class="list-albums-menu-primary">
                    <a href="#">Home</a>
                    <a href="#" data-active="true">Albums</a>
                    <a href="#">Singles and EPs</a>
                    <a href="#">Compilations</a>
                    <a href="#">Merch</a>
                    <a href="#">About</a>
                    <a href="#">Features &amp; More</a>

                    <button class="list-albums-menu-icon list-albums-menu-search" type="button" aria-label="Search">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/search-icon.png" alt="Search">
                    </button>
                </div>

                <div class="list-albums-menu-actions">
                    <button class="list-albums-menu-icon" type="button" aria-label="List view">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/list-icon.png" alt="List view">
                    </button>

                    <button class="list-albums-menu-icon" type="button" aria-label="Grid view">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/grid-icon.png" alt="Grid view">
                    </button>
                </div>
            </div>
        </section>

        <hr class="list-albums-divider">
        </hr>

        <section class="list-albums-content">
            <div class="list-albums-list">
                <!-- album item 1 -->
                <article class="list-albums-item">
                    <div class="list-albums-item-main">
                        <a class="list-albums-item-cover" href="#">
                            <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/frame1.png"
                                alt="Random Access Memories cover">
                        </a>

                        <div class="list-albums-item-body">
                            <h2 class="list-albums-item-title">
                                <a href="#">Random Access Memories</a>
                            </h2>

                            <p class="list-albums-item-meta">2023 <span>•</span> 22 songs <span>•</span> 1 hr 14 min</p>

                            <div class="list-albums-item-actions">
                                <button class="list-albums-item-play" type="button" aria-label="Play album">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/play-active.png"
                                        alt="Play">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Shuffle">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/shuffle.png"
                                        alt="Shuffle">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Add">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/add.png" alt="Add">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="List options">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/create2.png"
                                        alt="List options">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Download">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/download.png"
                                        alt="Download">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Upload">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/upload.png"
                                        alt="Upload">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="More">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/dots2.png" alt="More">
                                </button>
                            </div>
                        </div>
                    </div>

                    <a class="list-albums-item-arrow" href="#" aria-label="Open album">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/arrow-right.png" alt="Open album">
                    </a>
                </article>

                <hr class="list-albums-divider">
                </hr>
                <!-- album item 2 -->
                <article class="list-albums-item">
                    <div class="list-albums-item-main">
                        <a class="list-albums-item-cover" href="#">
                            <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/frame2.png"
                                alt="Random Access Memories 10th Anniversary Edition cover">
                        </a>

                        <div class="list-albums-item-body">
                            <h2 class="list-albums-item-title">
                                <a href="#">Random Access Memories (10th Anniversary Edition)</a>
                            </h2>

                            <p class="list-albums-item-meta">2013 <span>•</span> 22 songs <span>•</span> 1 hr 14 min</p>

                            <div class="list-albums-item-actions">
                                <button class="list-albums-item-play" type="button" aria-label="Play album">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/play-active.png"
                                        alt="Play">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Shuffle">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/shuffle.png"
                                        alt="Shuffle">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Add">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/plus-active.png"
                                        alt="Add">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="List options">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/create-active.png"
                                        alt="List options">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Download">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/download.png"
                                        alt="Download">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="Upload">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/upload.png"
                                        alt="Upload">
                                </button>

                                <button class="list-albums-item-icon" type="button" aria-label="More">
                                    <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/dots2.png" alt="More">
                                </button>
                            </div>
                        </div>
                    </div>

                    <a class="list-albums-item-arrow" href="#" aria-label="Open album">
                        <img src="./assets/images/desktop/cards/icons-and-frames-Nazi/arrow-right.png" alt="Open album">
                    </a>
                </article>
            </div>
        </section>

    </main>
